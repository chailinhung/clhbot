<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>取得訂購人名字...</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f4f7f9; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #06C755; border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
    <script>
        // 🔔 請確保此處為您 LIFF_ID
        const LIFF_ID = '2010205613-GBhWoaIf'; 
        
        // 🔔 請確保此處為您後端 GAS Web App 的部署網址
        const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzhUln6Pkz83tH0tgZo43QNqbDutANsa0Jzrov-qspv5Zk-nJG8s_nc1_XirMW8pZsTxw/exec';

        // 🔔 請將此處改為您 GitHub Pages 的專案根目錄網址（尾端不加斜線）
        const GITHUB_PAGES_BASE = 'https://chailinhung.github.io/clhbot';

        async function init() {
            // 設置 ｘ 秒超時防止 LIFF 載入卡死
            const timeoutPromise = new Promise(resolve => setTimeout(() => resolve({ userName: "" }), 5000));

            const liffPromise = (async () => {
                try {
                    await liff.init({ liffId: LIFF_ID });
                    if (!liff.isLoggedIn()) {
                        liff.login({ redirectUri: window.location.href });
                        return { waitLogin: true };
                    }

                    let userName = "";
                    // 第一層：嘗試極速解碼 (ID Token)
                    const idToken = liff.getDecodedIDToken();
                    if (idToken && idToken.name) {
                        userName = idToken.name;
                    } else {
                        // 第二層：連網抓取 (getProfile)
                        const profile = await liff.getProfile();
                        userName = profile.displayName;
                    }
                    return { userName: userName || "" };

                } catch (e) {
                    console.error('LIFF Error:', e);
                    return { userName: "" };
                }
            })();

            // 競賽：看是 LIFF 先跑完還是 ｘ 秒先到
            const result = await Promise.race([liffPromise, timeoutPromise]);

            if (result && result.waitLogin) return; // 如果正在跳轉登入，則不執行後續

            const urlParams = new URLSearchParams(window.location.search);
            const finalName = result.userName || "";
            urlParams.set('uName', finalName);

            // 🎯 【關鍵分流邏輯】
            const orderType = urlParams.get('type') || "";

            if (orderType === 'SUBWAY') {
                // 1. 如果是 subway_order，直接導回 GAS 執行原本的後端渲染
                window.location.replace(GAS_WEB_APP_URL + '?' + urlParams.toString());
            } else if (orderType === 'DRINK') {
                // 2. 如果是飲料，導向 GitHub 的 order_drink_ui.html
                window.location.replace(GITHUB_PAGES_BASE + '/order_drink_ui.html?' + urlParams.toString());
            } else {
                // 3. 其他狀況（一般餐點），導向 GitHub 的 order_ui.html
                window.location.replace(GITHUB_PAGES_BASE + '/order_ui.html?' + urlParams.toString());
            }
        }
        window.onload = init;
    </script>
</body>
</html>
