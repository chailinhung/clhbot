<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>訂餐</title>
  <style>
    :root { 
      --primary: #00b900; 
      --bg: #f4f4f4; 
      --text: #333; 
    }
    
    /* 🎯 降低手機預設字體大小，避免塞爆螢幕，電腦版維持舒適大小 */
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      padding: 8px; 
      background: var(--bg); 
      color: var(--text); 
      font-size: 16px; /* 修正原本 25px 過大的問題 */
      margin: 0; 
      line-height: 1.4;
    }
    
    .card { 
      background: white; 
      border-radius: 10px; 
      padding: 12px; 
      box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
      margin-bottom: 10px; 
      box-sizing: border-box;
    }
    
    /* 🎯 標題調整為適當的大小 */
    h2 { 
      color: var(--primary); 
      text-align: center; 
      margin: 0 0 12px 0; 
      font-size: 1.5rem; /* 修正為適合手機與電腦閱讀的 24px */
    }
    
    .input-group { 
      margin-bottom: 12px; 
    }
    
    label { 
      display: block; 
      font-weight: 600; 
      margin-bottom: 6px; 
      font-size: 1.05rem; 
    }
    
    input[type="text"] { 
      width: 100%; 
      padding: 10px; 
      border: 2px solid #ddd; 
      border-radius: 6px; 
      box-sizing: border-box; 
      font-size: 1.15rem; 
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus {
      border-color: var(--primary);
    }
    
    /* 菜單列表優化 */
    .menu-item { 
      display: flex; 
      align-items: center; 
      padding: 10px 0; 
      border-bottom: 1.5px solid #f0f0f0; 
    }
    
    .item-info { 
      flex: 1; 
      min-width: 0; 
      padding-right: 10px;
    }
    
    .item-name { 
      font-weight: 600; 
      font-size: 1.2rem; 
      white-space: nowrap; 
      overflow: hidden; 
      text-overflow: ellipsis; 
    }
    
    .item-price { 
      color: #666; 
      font-size: 1rem; 
      margin-top: 2px;
    }
    
    /* 按鈕與數量控制優化，防止在寬度不足的手機上跑版 */
    .qty-controls { 
      display: flex; 
      align-items: center; 
      gap: 8px; 
      flex-shrink: 0; 
    }
    
    .btn-qty { 
      background: #f5f5f5; 
      border: 1px solid #ccc; 
      width: 40px; /* 從原本 50px 縮小至最適合手機觸碰的 40px */
      height: 40px; 
      border-radius: 50%; 
      font-size: 1.4rem; 
      cursor: pointer; 
      display: flex;
      justify-content: center;
      align-items: center;
      transition: background 0.2s;
    }
    .btn-qty:active {
      background: #ddd;
    }
    
    .qty-val { 
      width: 30px; 
      text-align: center; 
      font-weight: bold; 
      font-size: 1.25rem; 
    }
    
    .btn-submit { 
      background: var(--primary); 
      color: white; 
      border: none; 
      padding: 14px; 
      border-radius: 25px; 
      font-size: 1.25rem; 
      font-weight: 600; 
      width: 100%; 
      margin-top: 10px; 
      cursor: pointer;
      box-shadow: 0 2px 4px rgba(0,185,0,0.2);
    }
    .btn-submit:disabled { 
      background: #ccc; 
      box-shadow: none;
      cursor: not-allowed;
    }
    
    /* 🎯 歷史訂單表格 RWD 手機版自適應優化 */
    table { 
      width: 100%; 
      border-collapse: collapse; 
      margin-top: 10px; 
      font-size: 0.95rem; /* 修正原本 1.75rem 太大塞爆表格的問題 */
      table-layout: fixed; 
    }
    
    th, td { 
      padding: 8px 4px; 
      border-bottom: 1.5px solid #eee; 
      overflow: hidden; 
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    th {
      font-weight: bold;
      background-color: #f9f9f9;
    }
    th:nth-child(1), td:nth-child(1) { width: 25%; text-align: left; } /* 人名 */
    th:nth-child(2), td:nth-child(2) { width: 35%; text-align: left; } /* 餐點 */
    th:nth-child(3), td:nth-child(3) { width: 12%; text-align: right; } /* 數 */
    th:nth-child(4), td:nth-child(4) { width: 15%; text-align: right; } /* 金額 */
    th:nth-child(5), td:nth-child(5) { width: 13%; text-align: center; } /* 刪除按鈕 */
    
    .btn-delete { 
      background: #fff0f0; 
      color: #a00; 
      border: 1px solid #a00; 
      padding: 4px 6px; 
      border-radius: 6px; 
      font-size: 0.8rem; 
      cursor: pointer;
    }
    .btn-delete:disabled { 
      background: #eee; 
      border-color: #ccc; 
      color: #999; 
    }
    
    /* 彈出視窗字體適度調整 */
    .large-swal { 
      font-size: 1.2rem !important; 
      width: 90% !important; 
    }
  </style>
</head>
<body>
  <div class="card">
    <h2 id="shop-title">🏪 載入中...</h2>
    <div class="input-group">
      <label>訂購人姓名： (訂購明細在最下方）</label>
      <input type="text" id="userName" value="" placeholder="請輸入名字" required>
    </div>

    <div id="menu-list">
      <div style="text-align:center; padding:20px;">正在讀取菜單...</div>
    </div>
    <div style="margin-top:15px; font-size: 1.6rem; font-weight: bold; color: #d32f2f; text-align: right;">總計：$<span id="total-price">0</span></div>
    <button type="button" id="submitBtn" class="btn-submit" onclick="submitForm()">送出訂單</button>
  </div>

  <div class="card">
    <h2>📊 目前訂單明細</h2>
    <table>
      <thead><tr><th>人名</th><th>餐點</th><th>數</th><th>金額</th><th>操作</th></tr></thead>
      <tbody id="history-body"><tr><td colspan="5">載入中...</td></tr></tbody>
    </table>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script>
    // 🔔 1. 請在此處替換成你部署好的 Google Apps Script 網路應用程式 URL
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzhUln6Pkz83tH0tgZo43QNqbDutANsa0Jzrov-qspv5Zk-nJG8s_nc1_XirMW8pZsTxw/exec";

    // 🔔 2. 宣告原本由 GAS 傳入的變數，現在改為從網址參數（Query URL）讀取
    let shopName = "";
    let groupId = "";
    let sessionId = "";
    let uName = "";
    let globalMenu = [];
    let quantities = [];

    window.onload = async function() {
      // 解析網址參數：例如 ?shop=麥當勞&gid=123&sid=456&uName=王小明
      const urlParams = new URLSearchParams(window.location.search);
      shopName = urlParams.get('shop') || "";
      groupId = urlParams.get('gid') || "";
      sessionId = urlParams.get('sid') || "";
      uName = urlParams.get('uName') || "";

      if (shopName) document.getElementById('shop-title').innerText = "🏪 " + shopName;
      if (uName) document.getElementById('userName').value = uName;
      
      // 非同步向 GAS 索取菜單與歷史訂單資料
      await fetchMenuAndHistory();
    };

    // 🔔 3. 向 GAS 後端 API 取得菜單資訊
    async function fetchMenuAndHistory() {
      try {
        const response = await fetch(`${GAS_WEB_APP_URL}?action=get_menu_and_init&shop=${encodeURIComponent(shopName)}&gid=${groupId}&sid=${sessionId}&type=MEAL`);
        if (!response.ok) throw new Error('網路回應不成功');
        
        const result = await response.json();
        globalMenu = result.menu || [];
        
        // 渲染菜單
        quantities = new Array(globalMenu.length).fill(0);
        renderMenu();
        
        // 渲染歷史紀錄
        renderHistoryTable(result.history || []);
      } catch (error) {
        console.error('初始化失敗:', error);
        document.getElementById('menu-list').innerHTML = '<div style="text-align:center; padding:20px; color:red;">無法載入菜單，請重新開啟頁面</div>';
      }
    }

    function renderMenu() {
      const list = document.getElementById('menu-list');
      if (globalMenu.length === 0) {
        list.innerHTML = '<div style="text-align:center; padding:20px;">此商店尚無菜單資料</div>';
        return;
      }
      list.innerHTML = globalMenu.map((item, index) => `
        <div class="menu-item">
          <div class="item-info">
            <div class="item-name">${item.name}</div>
            <div class="item-price">$${item.price}</div>
          </div>
          <div class="qty-controls">
            <button class="btn-qty" onclick="changeQty(${index}, -1)">-</button>
            <div class="qty-val" id="qty-${index}">0</div>
            <button class="btn-qty" onclick="changeQty(${index}, 1)">+</button>
          </div>
        </div>
      `).join('');
    }

    function changeQty(index, delta) {
      quantities[index] = Math.max(0, quantities[index] + delta);
      document.getElementById('qty-' + index).innerText = quantities[index];
      updateTotal();
    }
    
    function updateTotal() {
      let total = 0;
      quantities.forEach((qty, i) => { total += qty * globalMenu[i].price; });
      document.getElementById('total-price').innerText = total;
    }
    
    // 🔔 4. 修改後的送出訂單邏輯 (改用 POST fetch 傳送資料到 GAS)
    function submitForm() {
      const name = document.getElementById('userName').value.trim();
      if (!name) { Swal.fire('請先輸入姓名！'); return; }
      const orderData = [];
      quantities.forEach((q, i) => { if(q>0) orderData.push({name: globalMenu[i].name, price: globalMenu[i].price, qty: q}); });
      if (orderData.length === 0) { Swal.fire('請選擇餐點'); return; }

      let summaryText = orderData.map(o => `${o.name}*${o.qty}`).join('<br>');
      Swal.fire({
        title: '確認訂單內容',
        html: `訂購人：${name}<br><br><div style="text-align:left;">${summaryText}</div><br>總計：$${document.getElementById('total-price').innerText}`,
        customClass: { popup: 'large-swal' },
        showCancelButton: true,
        confirmButtonText: '確定送出',
        cancelButtonText: '取消'
      }).then(async (result) => {
        if (result.isConfirmed) {
          const btn = document.getElementById('submitBtn');
          btn.disabled = true;
          btn.innerText = "送出中...";

          const payload = {
            action: 'processWebOrder',
            userName: name,
            groupId: groupId,
            sessionId: sessionId,
            orderData: orderData,
            type: 'MEAL'
          };

          try {
            // 使用 POST 發送點餐資料（以 URLSearchParams 編碼以避免跨網域 CORS 問題）
            const response = await fetch(GAS_WEB_APP_URL, {
              method: 'POST',
              body: new URLSearchParams({ data: JSON.stringify(payload) })
            });
            const resData = await response.json();

            if (resData.status === 'success') {
              Swal.fire({ icon: 'success', title: '送出成功！', timer: 1000 });
              quantities.fill(0); 
              globalMenu.forEach((_, i) => document.getElementById('qty-'+i).innerText='0'); 
              updateTotal();
              loadHistory(); // 重新整理明細
            } else {
              throw new Error(resData.message || '點餐失敗');
            }
          } catch (error) {
            console.error('送出訂單錯誤:', error);
            Swal.fire({ icon: 'error', title: '送出失敗，請再試一次' });
          } finally {
            btn.disabled = false;
            btn.innerText = "送出訂單";
          }
        }
      });
    }

    // 🔔 5. 修改後的刪除訂單邏輯 (改用 POST fetch 傳送資料到 GAS)
    function deleteOrder(btn, userName, mealName) {
      Swal.fire({
        title: '確認刪除',
        html: `確定要刪除 ${userName} 的 ${mealName} 嗎？`,
        customClass: { popup: 'large-swal' },
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: '刪除',
        cancelButtonText: '取消'
      }).then(async (result) => {
        if (result.isConfirmed) {
          btn.disabled = true;
          btn.innerText = "刪除中...";

          const payload = {
            action: 'deleteWebOrder',
            groupId: groupId,
            sessionId: sessionId,
            userName: userName,
            mealName: mealName,
            type: 'MEAL'
          };

          try {
            const response = await fetch(GAS_WEB_APP_URL, {
              method: 'POST',
              body: new URLSearchParams({ data: JSON.stringify(payload) })
            });
            const resData = await response.json();

            if (resData.status === 'success') {
              loadHistory();
            } else {
              throw new Error('刪除失敗');
            }
          } catch (error) {
            console.error('刪除訂單錯誤:', error);
            btn.disabled = false;
            btn.innerText = "刪除";
          }
        }
      });
    }

    // 🔔 6. 重新載入歷史訂單明細
    async function loadHistory() {
      try {
        const response = await fetch(`${GAS_WEB_APP_URL}?action=get_orders&gid=${groupId}&sid=${sessionId}&type=MEAL`);
        const data = await response.json();
        renderHistoryTable(data);
      } catch (error) {
        console.error('加載歷史訂單失敗:', error);
      }
    }

    // 🔔 7. 渲染歷史訂單表格的輔助函式
    function renderHistoryTable(data) {
      const body = document.getElementById('history-body');
      body.innerHTML = data.length === 0 ? '<tr><td colspan="5">無資料</td></tr>' : data.map(r => `<tr>
        <td>${r.user}</td><td>${r.meal}</td><td style="text-align:right;">${r.qty}</td><td style="text-align:right;">$${r.price * r.qty}</td>
        <td><button class="btn-delete" onclick="deleteOrder(this, '${r.user}', '${r.meal}')">刪除</button></td>
      </tr>`).join('');
    }
  </script>
</body>
</html>
